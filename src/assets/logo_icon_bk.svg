<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="cyanGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF" />
      <stop offset="100%" stop-color="#00FF87" />
    </linearGradient>
    <linearGradient id="darkTeal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#008080" />
      <stop offset="100%" stop-color="#004d4d" />
    </linearGradient>
    <linearGradient id="glassLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.8)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0.1)" />
    </linearGradient>
    <linearGradient id="glassDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(0,229,255,0.4)" />
      <stop offset="100%" stop-color="rgba(0,255,135,0.1)" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g transform="translate(10, 20)">
    <!-- Background Circuitry Lines -->
    <path d="M 20 120 L 40 140 L 100 140 L 140 100 L 140 40" fill="none" stroke="url(#cyanGreen)" stroke-width="1.5" opacity="0.5" />
    <path d="M 160 60 L 180 40 L 180 20" fill="none" stroke="#00FF87" stroke-width="1" opacity="0.6" />
    <path d="M 40 40 L 20 60 L 20 100" fill="none" stroke="#00E5FF" stroke-width="1" opacity="0.6" />
    
    <!-- Glowing Nodes -->
    <circle cx="40" cy="140" r="3" fill="#00E5FF" filter="url(#glow)" />
    <circle cx="140" cy="100" r="3" fill="#00FF87" filter="url(#glow)" />
    <circle cx="20" cy="60" r="2" fill="#00E5FF" />
    <circle cx="160" cy="60" r="4" fill="#00FF87" filter="url(#glow)" />

    <!-- Isometric 'B' -->
    <g transform="translate(20, 30)">
      <!-- Left Pillar -->
      <path d="M 0 20 L 20 10 L 20 90 L 0 100 Z" fill="url(#darkTeal)" stroke="url(#cyanGreen)" stroke-width="1" />
      <path d="M 0 20 L 20 10 L 35 20 L 15 30 Z" fill="url(#glassLight)" opacity="0.6" stroke="url(#cyanGreen)" stroke-width="1" />
      <path d="M 15 30 L 35 20 L 35 100 L 15 110 Z" fill="url(#glassDark)" stroke="url(#cyanGreen)" stroke-width="1" />
      
      <!-- Top Loop -->
      <path d="M 35 20 L 65 5 L 80 15 L 50 30 Z" fill="url(#glassLight)" opacity="0.8" stroke="url(#cyanGreen)" stroke-width="1" />
      <path d="M 80 15 L 80 45 L 50 60 L 50 30 Z" fill="url(#glassDark)" stroke="url(#cyanGreen)" stroke-width="1" />
      <path d="M 35 50 L 50 60 L 50 30 L 35 20 Z" fill="url(#darkTeal)" stroke="url(#cyanGreen)" stroke-width="1" />
      
      <!-- Bottom Loop -->
      <path d="M 35 60 L 65 45 L 85 55 L 55 70 Z" fill="url(#glassLight)" opacity="0.8" stroke="url(#cyanGreen)" stroke-width="1" />
      <path d="M 85 55 L 85 85 L 55 100 L 55 70 Z" fill="url(#glassDark)" stroke="url(#cyanGreen)" stroke-width="1" />
      <path d="M 35 90 L 55 100 L 55 70 L 35 60 Z" fill="url(#darkTeal)" stroke="url(#cyanGreen)" stroke-width="1" />
    </g>

    <!-- Isometric 'K' -->
    <g transform="translate(90, 30)">
      <!-- Left Pillar -->
      <path d="M 0 20 L 15 10 L 15 90 L 0 100 Z" fill="url(#darkTeal)" stroke="url(#cyanGreen)" stroke-width="1" />
      <path d="M 0 20 L 15 10 L 30 20 L 15 30 Z" fill="url(#glassLight)" opacity="0.6" stroke="url(#cyanGreen)" stroke-width="1" />
      <path d="M 15 30 L 30 20 L 30 100 L 15 110 Z" fill="url(#glassDark)" stroke="url(#cyanGreen)" stroke-width="1" />
      
      <!-- Top Arm -->
      <path d="M 30 50 L 60 20 L 75 30 L 45 60 Z" fill="url(#glassLight)" opacity="0.8" stroke="url(#cyanGreen)" stroke-width="1" />
      <path d="M 75 30 L 75 45 L 45 75 L 45 60 Z" fill="url(#glassDark)" stroke="url(#cyanGreen)" stroke-width="1" />
      <path d="M 30 65 L 45 75 L 45 60 L 30 50 Z" fill="url(#darkTeal)" stroke="url(#cyanGreen)" stroke-width="1" />

      <!-- Bottom Arm -->
      <path d="M 45 60 L 75 80 L 60 90 L 30 70 Z" fill="url(#glassLight)" opacity="0.8" stroke="url(#cyanGreen)" stroke-width="1" />
      <path d="M 75 80 L 75 95 L 60 105 L 60 90 Z" fill="url(#glassDark)" stroke="url(#cyanGreen)" stroke-width="1" />
      <path d="M 30 85 L 60 105 L 60 90 L 30 70 Z" fill="url(#darkTeal)" stroke="url(#cyanGreen)" stroke-width="1" />
    </g>

    <!-- Foreground Floating Cubes -->
    <g transform="translate(150, 90)">
      <path d="M 0 10 L 10 5 L 20 10 L 10 15 Z" fill="url(#glassLight)" stroke="#00FF87" stroke-width="0.5" />
      <path d="M 0 10 L 10 15 L 10 25 L 0 20 Z" fill="url(#darkTeal)" stroke="#00FF87" stroke-width="0.5" />
      <path d="M 10 15 L 20 10 L 20 20 L 10 25 Z" fill="url(#glassDark)" stroke="#00FF87" stroke-width="0.5" />
    </g>
    <g transform="translate(10, 120) scale(0.6)">
      <path d="M 0 10 L 10 5 L 20 10 L 10 15 Z" fill="url(#glassLight)" stroke="#00E5FF" stroke-width="0.5" />
      <path d="M 0 10 L 10 15 L 10 25 L 0 20 Z" fill="url(#darkTeal)" stroke="#00E5FF" stroke-width="0.5" />
      <path d="M 10 15 L 20 10 L 20 20 L 10 25 Z" fill="url(#glassDark)" stroke="#00E5FF" stroke-width="0.5" />
    </g>
  </g>
</svg>
